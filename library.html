<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتبة الأنمي - SNOW KORAL ❄️</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .library-container {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        /* رأس المكتبة */
        .library-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .header-title {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .title-icon {
            font-size: 3rem;
        }

        .title-text {
            font-size: 2.5rem;
            color: #a8e6ff;
        }

        .header-stats {
            display: flex;
            gap: 2rem;
            background: rgba(255,255,255,0.05);
            padding: 1rem 2rem;
            border-radius: 50px;
        }

        .stat {
            text-align: center;
        }

        .stat-number {
            font-size: 1.5rem;
            color: #a8e6ff;
            font-weight: bold;
        }

        .stat-label {
            color: #b0d9ff;
            font-size: 0.9rem;
        }

        /* شريط البحث والفلاتر */
        .search-bar {
            background: rgba(255,255,255,0.05);
            border-radius: 50px;
            padding: 0.5rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .search-input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 1rem;
            color: white;
        }

        .search-input:focus {
            outline: none;
        }

        .filter-buttons {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }

        .filter-btn {
            padding: 0.8rem 2rem;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(74,163,255,0.3);
            border-radius: 30px;
            color: #e0f2fe;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: #4aa3ff;
            color: #0a1f2e;
        }

        /* شبكة الأنمي */
        .anime-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 2rem;
            margin: 2rem 0;
        }

        .anime-card {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 1.5rem 1rem;
            border: 1px solid rgba(74,163,255,0.3);
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .anime-card:hover {
            transform: translateY(-10px);
            border-color: #4aa3ff;
            box-shadow: 0 10px 30px rgba(74,163,255,0.3);
        }

        .anime-card::before {
            content: '★';
            position: absolute;
            top: -20px;
            right: -20px;
            font-size: 8rem;
            opacity: 0.1;
            color: gold;
            transform: rotate(15deg);
        }

        .anime-poster {
            width: 100%;
            aspect-ratio: 2/3;
            background: linear-gradient(135deg, #4aa3ff, #a8e6ff);
            border-radius: 15px;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            position: relative;
            overflow: hidden;
        }

        .anime-poster img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .anime-title {
            font-size: 1.1rem;
            color: #a8e6ff;
            text-align: center;
            margin-bottom: 0.5rem;
            font-weight: bold;
        }

        .anime-info {
            display: flex;
            justify-content: center;
            gap: 1rem;
            color: #b0d9ff;
            font-size: 0.9rem;
        }

        .rating {
            color: gold;
        }

        .year {
            color: #6b8ca6;
        }

        /* نافذة التفاصيل */
        .modal-large {
            max-width: 900px !important;
        }

        .anime-detail {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 2rem;
        }

        .detail-poster {
            background: linear-gradient(135deg, #4aa3ff, #a8e6ff);
            border-radius: 20px;
            aspect-ratio: 2/3;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 5rem;
        }

        .detail-title {
            font-size: 2rem;
            color: #a8e6ff;
            margin-bottom: 1rem;
        }

        .detail-meta {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .meta-tag {
            background: rgba(74,163,255,0.2);
            padding: 0.3rem 1rem;
            border-radius: 20px;
            color: #4aa3ff;
        }

        .detail-description {
            color: #b0d9ff;
            line-height: 1.8;
            margin-bottom: 2rem;
        }

        .action-buttons {
            display: flex;
            gap: 1rem;
            margin: 2rem 0;
            flex-wrap: wrap;
        }

        .action-btn {
            padding: 1rem 2rem;
            border: none;
            border-radius: 30px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .watch-btn {
            background: #4aa3ff;
            color: #0a1f2e;
        }

        .rate-btn {
            background: gold;
            color: #0a1f2e;
        }

        .review-btn {
            background: rgba(255,255,255,0.1);
            color: white;
        }

        /* التقييم */
        .rating-stars {
            display: flex;
            gap: 0.5rem;
            margin: 1rem 0;
        }

        .star {
            font-size: 2rem;
            color: #6b8ca6;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .star:hover,
        .star.active {
            color: gold;
            transform: scale(1.2);
        }

        /* المراجعات */
        .reviews-section {
            margin-top: 2rem;
        }

        .review-item {
            background: rgba(255,255,255,0.02);
            border-radius: 15px;
            padding: 1.5rem;
            margin: 1rem 0;
        }

        .review-header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1rem;
        }

        .reviewer-avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #4aa3ff, #a8e6ff);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .reviewer-name {
            color: #a8e6ff;
            font-weight: bold;
        }

        .review-rating {
            color: gold;
            margin-right: auto;
        }

        .review-text {
            color: #b0d9ff;
            line-height: 1.6;
        }

        /* قائمة المشاهدة */
        .watchlist-section {
            background: rgba(255,255,255,0.05);
            border-radius: 30px;
            padding: 2rem;
            margin: 2rem 0;
        }

        .watchlist-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }

        .watchlist-item {
            background: rgba(255,255,255,0.02);
            border-radius: 15px;
            padding: 1rem;
            text-align: center;
            border: 1px solid rgba(74,163,255,0.3);
        }

        /* التصنيفات */
        .categories-cloud {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin: 2rem 0;
        }

        .category-tag {
            padding: 0.5rem 1.5rem;
            background: rgba(74,163,255,0.1);
            border: 1px solid rgba(74,163,255,0.3);
            border-radius: 30px;
            color: #b0d9ff;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .category-tag:hover {
            background: #4aa3ff;
            color: #0a1f2e;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <div class="logo">
                <span class="snow-icon">❄️</span>
                <h1>SNOW KORAL</h1>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">الرئيسية</a></li>
                <li><a href="library.html" class="active">📖 المكتبة</a></li>
                <li><a href="friends.html">🤝 الأصدقاء</a></li>
                <li><a href="notifications.html">🔔 الإشعارات</a></li>
                <li><a href="profile.html">👤 الملف</a></li>
            </ul>
            <div class="auth-buttons">
                <a href="login.html" class="btn btn-login">تسجيل دخول</a>
                <a href="signup.html" class="btn btn-signup">انضم الآن</a>
            </div>
        </nav>
    </header>

    <main class="library-container">
        <!-- رأس المكتبة -->
        <div class="library-header">
            <div class="header-title">
                <span class="title-icon">📖</span>
                <h1 class="title-text">مكتبة الأنمي</h1>
            </div>
            <div class="header-stats">
                <div class="stat">
                    <div class="stat-number">247</div>
                    <div class="stat-label">أنمي</div>
                </div>
                <div class="stat">
                    <div class="stat-number">1.2k</div>
                    <div class="stat-label">تقييم</div>
                </div>
                <div class="stat">
                    <div class="stat-number">89</div>
                    <div class="stat-label">مراجعة</div>
                </div>
            </div>
        </div>

        <!-- شريط البحث -->
        <div class="search-bar">
            <span>🔍</span>
            <input type="text" class="search-input" placeholder="ابحث عن أنمي..." id="searchInput">
        </div>

        <!-- فلاتر -->
        <div class="filter-buttons">
            <button class="filter-btn active" onclick="filterAnime('all')">الكل</button>
            <button class="filter-btn" onclick="filterAnime('action')">أكشن</button>
            <button class="filter-btn" onclick="filterAnime('adventure')">مغامرة</button>
            <button class="filter-btn" onclick="filterAnime('comedy')">كوميدي</button>
            <button class="filter-btn" onclick="filterAnime('drama')">دراما</button>
            <button class="filter-btn" onclick="filterAnime('fantasy')">فانتازيا</button>
            <button class="filter-btn" onclick="filterAnime('romance')">رومانسي</button>
            <button class="filter-btn" onclick="filterAnime('sci-fi')">خيال علمي</button>
        </div>

        <!-- شبكة الأنمي -->
        <div class="anime-grid" id="animeGrid">
            <!-- هيتحمّل بالجافاسكريبت -->
        </div>

        <!-- قائمة المشاهدة -->
        <div class="watchlist-section">
            <h2 style="color: #a8e6ff; margin-bottom: 1rem;">📋 قائمة مشاهدتي</h2>
            <div class="watchlist-grid" id="watchlist">
                <!-- هيتحمّل بالجافاسكريبت -->
            </div>
        </div>
    </main>

    <!-- مودال تفاصيل الأنمي -->
    <div class="modal" id="animeModal">
        <div class="modal-content modal-large">
            <div class="modal-header">
                <h3 style="color: #a8e6ff;">تفاصيل الأنمي</h3>
                <span class="modal-close" onclick="closeModal()">&times;</span>
            </div>
            <div class="anime-detail" id="animeDetail">
                <!-- هيتحمّل بالجافاسكريبت -->
            </div>
        </div>
    </div>

    <script>
        // ==================== بيانات الأنمي ====================
        const animeList = [
            {
                id: 1,
                title: 'ناروتو',
                titleEn: 'Naruto',
                image: '🍥',
                year: 2002,
                rating: 4.8,
                episodes: 220,
                status: 'مكتمل',
                categories: ['action', 'adventure', 'comedy'],
                description: 'قصة نينجا شاب يحلم بأن يصبح الهوكاجي',
                studio: 'Pierrot',
                director: 'هاياتو داتي',
                cast: ['جونكو تاكيوتشي', 'تشي ناكامورا'],
                reviews: [
                    { user: 'فـانـتـيـاس', rating: 5, text: 'أنمي رائع، قصة ممتعة وشخصيات جميلة' },
                    { user: 'سـكـونـا', rating: 4.5, text: 'من أفضل الأنمي اللي شفتها' }
                ]
            },
            {
                id: 2,
                title: 'ون بيس',
                titleEn: 'One Piece',
                image: '🏴‍☠️',
                year: 1999,
                rating: 4.9,
                episodes: 1000,
                status: 'مستمر',
                categories: ['action', 'adventure', 'comedy', 'fantasy'],
                description: 'مغامرات قرصان يبحث عن كنز ون بيس',
                studio: 'Toei Animation',
                director: 'كونوسكي أودا',
                cast: ['مايومي تاناكا', 'كازويا ناكاي'],
                reviews: [
                    { user: 'جان 🔥', rating: 5, text: 'الأنمي الأسطوري' }
                ]
            },
            {
                id: 3,
                title: 'Attack on Titan',
                titleEn: 'Shingeki no Kyojin',
                image: '⚔️',
                year: 2013,
                rating: 4.9,
                episodes: 87,
                status: 'مكتمل',
                categories: ['action', 'drama', 'fantasy'],
                description: 'معركة البشر ضد العمالقة',
                studio: 'Wit Studio',
                director: 'تيتسورو أراكي',
                cast: ['يوكي كاجي', 'يوي إيشيكاوا'],
                reviews: []
            },
            {
                id: 4,
                title: 'Demon Slayer',
                titleEn: 'Kimetsu no Yaiba',
                image: '👹',
                year: 2019,
                rating: 4.8,
                episodes: 44,
                status: 'مكتمل',
                categories: ['action', 'fantasy'],
                description: 'صياد شياطين يسعى لإنقاذ أخته',
                studio: 'Ufotable',
                director: 'هارو سوتوزاكي',
                cast: ['ناتسكي هاناي', 'أكاري كيتو'],
                reviews: []
            },
            {
                id: 5,
                title: 'Death Note',
                titleEn: 'Death Note',
                image: '📓',
                year: 2006,
                rating: 4.9,
                episodes: 37,
                status: 'مكتمل',
                categories: ['drama', 'thriller'],
                description: 'طالب يجد دفتر الموت',
                studio: 'Madhouse',
                director: 'تيتسورو أراكي',
                cast: ['مامورو ميانو', 'كاباي ياماغوتشي'],
                reviews: []
            },
            {
                id: 6,
                title: 'My Hero Academia',
                titleEn: 'Boku no Hero Academia',
                image: '💪',
                year: 2016,
                rating: 4.7,
                episodes: 113,
                status: 'مستمر',
                categories: ['action', 'comedy'],
                description: 'صبي يولد بدون قوة خارقة في عالم مليء بالأبطال',
                studio: 'Bones',
                director: 'كينجي ناغاساكي',
                cast: ['دايكي ياماشيتا', 'نوبوهيكو أوكاموتو'],
                reviews: []
            }
        ];

        // بيانات المستخدم
        let currentUser = JSON.parse(localStorage.getItem('snowKoralCurrentUser')) || {
            username: 'فـانـتـيـاس',
            watchlist: [1, 3]
        };

        // تحميل الأنمي
        function loadAnime(filter = 'all') {
            const grid = document.getElementById('animeGrid');
            
            let filtered = animeList;
            if (filter !== 'all') {
                filtered = animeList.filter(a => a.categories.includes(filter));
            }
            
            grid.innerHTML = '';
            
            filtered.forEach(anime => {
                grid.innerHTML += `
                    <div class="anime-card" onclick="openAnimeDetail(${anime.id})">
                        <div class="anime-poster">${anime.image}</div>
                        <h3 class="anime-title">${anime.title}</h3>
                        <div class="anime-info">
                            <span class="rating">⭐ ${anime.rating}</span>
                            <span class="year">${anime.year}</span>
                        </div>
                    </div>
                `;
            });
        }

        // فلترة الأنمي
        function filterAnime(category) {
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            loadAnime(category);
        }

        // فتح تفاصيل الأنمي
        function openAnimeDetail(id) {
            const anime = animeList.find(a => a.id === id);
            const detail = document.getElementById('animeDetail');
            
            const inWatchlist = currentUser.watchlist.includes(id);
            
            detail.innerHTML = `
                <div class="detail-poster">${anime.image}</div>
                <div>
                    <h2 class="detail-title">${anime.title} (${anime.titleEn})</h2>
                    
                    <div class="detail-meta">
                        <span class="meta-tag">⭐ ${anime.rating}</span>
                        <span class="meta-tag">📅 ${anime.year}</span>
                        <span class="meta-tag">📺 ${anime.episodes} حلقة</span>
                        <span class="meta-tag">${anime.status}</span>
                    </div>
                    
                    <div class="detail-meta">
                        ${anime.categories.map(c => `<span class="meta-tag">${c}</span>`).join('')}
                    </div>
                    
                    <p class="detail-description">${anime.description}</p>
                    
                    <div class="action-buttons">
                        <button class="action-btn watch-btn" onclick="markAsWatched(${anime.id})">✅ شاهدت</button>
                        <button class="action-btn rate-btn" onclick="showRating(${anime.id})">⭐ قيم</button>
                        <button class="action-btn review-btn" onclick="addToWatchlist(${anime.id})">${inWatchlist ? '✓ في قائمتي' : '➕ أضف لقائمتي'}</button>
                    </div>
                    
                    <div class="rating-stars" id="ratingStars" style="display: none;">
                        <span class="star" onclick="rateAnime(1)">★</span>
                        <span class="star" onclick="rateAnime(2)">★</span>
                        <span class="star" onclick="rateAnime(3)">★</span>
                        <span class="star" onclick="rateAnime(4)">★</span>
                        <span class="star" onclick="rateAnime(5)">★</span>
                    </div>
                    
                    <div class="reviews-section">
                        <h3 style="color: #a8e6ff; margin-bottom: 1rem;">📝 المراجعات</h3>
                        ${anime.reviews.map(r => `
                            <div class="review-item">
                                <div class="review-header">
                                    <div class="reviewer-avatar">${r.user[0]}</div>
                                    <span class="reviewer-name">${r.user}</span>
                                    <span class="review-rating">⭐ ${r.rating}</span>
                                </div>
                                <div class="review-text">${r.text}</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
            
            document.getElementById('animeModal').classList.add('active');
        }

        // إغلاق المودال
        function closeModal() {
            document.getElementById('animeModal').classList.remove('active');
        }

        // إضافة لقائمة المشاهدة
        function addToWatchlist(id) {
            if (!currentUser.watchlist.includes(id)) {
                currentUser.watchlist.push(id);
                localStorage.setItem('snowKoralCurrentUser', JSON.stringify(currentUser));
                alert('✅ تمت الإضافة لقائمة مشاهدتي');
                loadWatchlist();
            } else {
                alert('الأنمي موجود بالفعل في قائمتك');
            }
        }

        // تحميل قائمة المشاهدة
        function loadWatchlist() {
            const grid = document.getElementById('watchlist');
            
            if (!currentUser.watchlist || currentUser.watchlist.length === 0) {
                grid.innerHTML = '<p style="color: #6b8ca6;">لا توجد أنمي في قائمة المشاهدة</p>';
                return;
            }
            
            grid.innerHTML = '';
            
            currentUser.watchlist.forEach(id => {
                const anime = animeList.find(a => a.id === id);
                if (anime) {
                    grid.innerHTML += `
                        <div class="watchlist-item" onclick="openAnimeDetail(${anime.id})">
                            <div style="font-size: 2rem; margin-bottom: 0.5rem;">${anime.image}</div>
                            <div style="color: #a8e6ff;">${anime.title}</div>
                        </div>
                    `;
                }
            });
        }

        // إظهار التقييم
        function showRating() {
            document.getElementById('ratingStars').style.display = 'flex';
        }

        // تقييم الأنمي
        function rateAnime(rating) {
            alert(`⭐ شكراً لتقييمك بـ ${rating} نجوم`);
            document.getElementById('ratingStars').style.display = 'none';
        }

        // تحديد كمشاهد
        function markAsWatched(id) {
            alert('✅ تم تسجيل الأنمي كمشاهد');
        }

        // تحميل الصفحة
        window.onload = function() {
            loadAnime();
            loadWatchlist();
        };
    </script>
</body>
</html>
