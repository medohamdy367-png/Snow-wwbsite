<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الشات الداخلي - SNOW KORAL ❄️</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .chat-container {
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 1.5rem;
            height: calc(100vh - 200px);
            margin: 2rem 0;
        }
        
        /* قائمة المحادثات */
        .chat-sidebar {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(74,163,255,0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .chat-search {
            padding: 1rem;
            border-bottom: 1px solid rgba(74,163,255,0.3);
        }
        
        .chat-search input {
            width: 100%;
            padding: 0.8rem;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(74,163,255,0.3);
            border-radius: 10px;
            color: white;
        }
        
        .chat-list {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
        }
        
        .chat-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-bottom: 0.5rem;
            position: relative;
        }
        
        .chat-item:hover,
        .chat-item.active {
            background: rgba(74,163,255,0.2);
            transform: translateX(-5px);
        }
        
        .chat-avatar {
            width: 50px;
            height: 50px;
            background: linear-gradient(45deg, #4aa3ff, #a8e6ff);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: #0a1f2e;
            position: relative;
        }
        
        .online-status {
            width: 12px;
            height: 12px;
            background: #00cc66;
            border-radius: 50%;
            position: absolute;
            bottom: 2px;
            right: 2px;
            border: 2px solid #0a1f2e;
        }
        
        .offline-status {
            background: #6b8ca6;
        }
        
        .chat-info {
            flex: 1;
        }
        
        .chat-name {
            font-weight: bold;
            color: #a8e6ff;
            margin-bottom: 0.2rem;
        }
        
        .chat-last-message {
            font-size: 0.9rem;
            color: #6b8ca6;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 150px;
        }
        
        .chat-time {
            font-size: 0.8rem;
            color: #4aa3ff;
        }
        
        .unread-badge {
            background: #4aa3ff;
            color: #0a1f2e;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: bold;
        }
        
        /* منطقة المحادثة الرئيسية */
        .chat-main {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(74,163,255,0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        .chat-header {
            padding: 1.5rem;
            border-bottom: 1px solid rgba(74,163,255,0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .chat-header-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .chat-header-avatar {
            width: 50px;
            height: 50px;
            background: linear-gradient(45deg, #4aa3ff, #a8e6ff);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }
        
        .chat-header-name {
            font-size: 1.3rem;
            color: #a8e6ff;
        }
        
        .chat-header-status {
            font-size: 0.9rem;
            color: #00cc66;
        }
        
        .chat-actions {
            display: flex;
            gap: 1rem;
        }
        
        .chat-action-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(74,163,255,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .chat-action-btn:hover {
            background: #4aa3ff;
            color: #0a1f2e;
            transform: scale(1.1);
        }
        
        /* منطقة الرسائل */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        
        .message {
            display: flex;
            gap: 1rem;
            max-width: 70%;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .message.sent {
            align-self: flex-end;
            flex-direction: row-reverse;
        }
        
        .message-avatar {
            width: 40px;
            height: 40px;
            background: linear-gradient(45deg, #4aa3ff, #a8e6ff);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }
        
        .message-content {
            background: rgba(255,255,255,0.1);
            padding: 1rem;
            border-radius: 15px;
            position: relative;
        }
        
        .message.sent .message-content {
            background: #4aa3ff;
            color: #0a1f2e;
        }
        
        .message.sent .message-content::after {
            content: '';
            position: absolute;
            top: 50%;
            left: -8px;
            transform: translateY(-50%);
            border-width: 8px 0 8px 8px;
            border-style: solid;
            border-color: transparent transparent transparent #4aa3ff;
        }
        
        .message.received .message-content::after {
            content: '';
            position: absolute;
            top: 50%;
            right: -8px;
            transform: translateY(-50%);
            border-width: 8px 8px 8px 0;
            border-style: solid;
            border-color: transparent rgba(255,255,255,0.1) transparent transparent;
        }
        
        .message-text {
            margin-bottom: 0.3rem;
            line-height: 1.5;
        }
        
        .message-time {
            font-size: 0.7rem;
            color: inherit;
            opacity: 0.7;
            text-align: left;
        }
        
        .message.sent .message-time {
            color: #0a1f2e;
        }
        
        /* منطقة إدخال الرسالة */
        .chat-input-area {
            padding: 1.5rem;
            border-top: 1px solid rgba(74,163,255,0.3);
            display: flex;
            gap: 1rem;
            align-items: center;
        }
        
        .chat-input {
            flex: 1;
            display: flex;
            gap: 0.5rem;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(74,163,255,0.3);
            border-radius: 30px;
            padding: 0.3rem;
        }
        
        .chat-input input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 0.8rem 1rem;
            color: white;
        }
        
        .chat-input input:focus {
            outline: none;
        }
        
        .chat-input-actions {
            display: flex;
            gap: 0.5rem;
        }
        
        .chat-input-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .chat-input-btn:hover {
            background: #4aa3ff;
            color: #0a1f2e;
            transform: scale(1.1);
        }
        
        .chat-send-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(45deg, #4aa3ff, #a8e6ff);
            border: none;
            color: #0a1f2e;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .chat-send-btn:hover {
            transform: scale(1.1) rotate(10deg);
            box-shadow: 0 0 20px #4aa3ff;
        }
        
        /* تأثيرات إضافية */
        .typing-indicator {
            display: flex;
            gap: 0.3rem;
            padding: 1rem;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            width: fit-content;
            margin-top: 0.5rem;
        }
        
        .typing-dot {
            width: 8px;
            height: 8px;
            background: #4aa3ff;
            border-radius: 50%;
            animation: typingBounce 1.4s infinite ease-in-out;
        }
        
        .typing-dot:nth-child(1) { animation-delay: 0s; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes typingBounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }
        
        /* ردود الفعل */
        .message-reactions {
            display: flex;
            gap: 0.3rem;
            margin-top: 0.3rem;
        }
        
        .reaction {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 0.2rem 0.5rem;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .reaction:hover {
            transform: scale(1.2);
            background: #4aa3ff;
            color: #0a1f2e;
        }
        
        /* ستيكرات */
        .stickers-panel {
            position: absolute;
            bottom: 100%;
            right: 0;
            background: #0a1f2e;
            border: 2px solid #4aa3ff;
            border-radius: 20px;
            padding: 1rem;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0.5rem;
            margin-bottom: 0.5rem;
            display: none;
        }
        
        .stickers-panel.show {
            display: grid;
            animation: slideUp 0.3s ease;
        }
        
        .sticker {
            font-size: 2rem;
            padding: 0.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }
        
        .sticker:hover {
            transform: scale(1.3);
            background: rgba(74,163,255,0.3);
            border-radius: 10px;
        }
        
        @media (max-width: 768px) {
            .chat-container {
                grid-template-columns: 1fr;
            }
            
            .chat-sidebar {
                display: none;
            }
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <div class="logo">
                <span class="snow-icon">❄️</span>
                <h1>SNOW KORAL</h1>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">الرئيسية</a></li>
                <li><a href="ranks.html">الرتب</a></li>
                <li><a href="members.html">الأعضاء</a></li>
                <li><a href="chat.html" class="active">الشات</a></li>
                <li><a href="events.html">الفعاليات</a></li>
                <li><a href="shop.html">المتجر</a></li>
            </ul>
            <div class="auth-buttons">
                <a href="login.html" class="btn btn-login">تسجيل دخول</a>
                <a href="signup.html" class="btn btn-signup">انضم الآن</a>
            </div>
        </nav>
    </header>

    <main>
        <div class="chat-container">
            <!-- قائمة المحادثات -->
            <div class="chat-sidebar">
                <div class="chat-search">
                    <input type="text" placeholder="🔍 بحث عن أعضاء..." id="chatSearch" onkeyup="searchChats()">
                </div>
                
                <div class="chat-list" id="chatList">
                    <!-- هتتعبأ بالجافاسكريبت -->
                </div>
            </div>
            
            <!-- منطقة المحادثة الرئيسية -->
            <div class="chat-main">
                <div class="chat-header">
                    <div class="chat-header-info">
                        <div class="chat-header-avatar" id="currentChatAvatar">👤</div>
                        <div>
                            <div class="chat-header-name" id="currentChatName">اختر محادثة</div>
                            <div class="chat-header-status" id="currentChatStatus">...</div>
                        </div>
                    </div>
                    
                    <div class="chat-actions">
                        <div class="chat-action-btn" onclick="toggleStickers()">😊</div>
                        <div class="chat-action-btn" onclick="clearChat()">🗑️</div>
                        <div class="chat-action-btn" onclick="blockUser()">🚫</div>
                    </div>
                </div>
                
                <!-- منطقة عرض الرسائل -->
                <div class="chat-messages" id="chatMessages">
                    <!-- الرسائل هتظهر هنا -->
                </div>
                
                <!-- لوحة الستيكرات -->
                <div class="stickers-panel" id="stickersPanel">
                    <span class="sticker" onclick="sendSticker('😊')">😊</span>
                    <span class="sticker" onclick="sendSticker('😂')">😂</span>
                    <span class="sticker" onclick="sendSticker('❤️')">❤️</span>
                    <span class="sticker" onclick="sendSticker('🎮')">🎮</span>
                    <span class="sticker" onclick="sendSticker('👑')">👑</span>
                    <span class="sticker" onclick="sendSticker('❄️')">❄️</span>
                    <span class="sticker" onclick="sendSticker('🔥')">🔥</span>
                    <span class="sticker" onclick="sendSticker('🎌')">🎌</span>
                    <span class="sticker" onclick="sendSticker('⚔️')">⚔️</span>
                    <span class="sticker" onclick="sendSticker('🛡️')">🛡️</span>
                    <span class="sticker" onclick="sendSticker('🏆')">🏆</span>
                    <span class="sticker" onclick="sendSticker('🍜')">🍜</span>
                </div>
                
                <!-- منطقة كتابة الرسالة -->
                <div class="chat-input-area">
                    <div class="chat-input">
                        <input type="text" placeholder="اكتب رسالتك..." id="messageInput" onkeyup="checkTyping()" onkeypress="if(event.key==='Enter') sendMessage()">
                        <div class="chat-input-actions">
                            <button class="chat-input-btn" onclick="attachFile()">📎</button>
                            <button class="chat-input-btn" onclick="openEmoji()">😊</button>
                        </div>
                    </div>
                    <button class="chat-send-btn" onclick="sendMessage()">➤</button>
                </div>
                
                <!-- مؤشر الكتابة -->
                <div id="typingIndicator" style="display: none; padding: 0 2rem;">
                    <div class="typing-indicator">
                        <span class="typing-dot"></span>
                        <span class="typing-dot"></span>
                        <span class="typing-dot"></span>
                        <span style="margin-right: 0.5rem; color: #6b8ca6;">يكتب...</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // بيانات المستخدم الحالي
        const currentUser = JSON.parse(localStorage.getItem('snowKoralCurrentUser')) || {
            username: 'زائر',
            avatar: '👤',
            rank: 'زائر'
        };
        
        // بيانات المحادثات (مؤقتة)
        let chats = [
            {
                id: 1,
                name: 'فـانـتـيـاس',
                avatar: '👑',
                rank: 'الامبراطور',
                status: 'online',
                lastMessage: 'مرحباً بك في المملكة',
                time: 'منذ 5 دقائق',
                unread: 2,
                messages: [
                    { id: 1, sender: 'فـانـتـيـاس', content: 'مرحباً بك في المملكة', time: '10:30', type: 'text', reactions: [] },
                    { id: 2, sender: currentUser.username, content: 'شكراً جزيلاً', time: '10:32', type: 'text' },
                    { id: 3, sender: 'فـانـتـيـاس', content: 'كيف تجد النقابة؟', time: '10:33', type: 'text' }
                ]
            },
            {
                id: 2,
                name: 'سـكـونـا',
                avatar: '⛄',
                rank: 'نائب الامبراطور',
                status: 'online',
                lastMessage: 'استعد للفعالية الليلة',
                time: 'منذ ساعة',
                unread: 0,
                messages: [
                    { id: 1, sender: 'سـكـونـا', content: 'السلام عليكم', time: '09:15', type: 'text' },
                    { id: 2, sender: currentUser.username, content: 'وعليكم السلام', time: '09:16', type: 'text' },
                    { id: 3, sender: 'سـكـونـا', content: 'استعد للفعالية الليلة', time: '09:17', type: 'text' }
                ]
            },
            {
                id: 3,
                name: 'زورو',
                avatar: '⚔️',
                rank: 'جنرال',
                status: 'offline',
                lastMessage: 'نقطتي وصلت 3500',
                time: 'منذ 3 ساعات',
                unread: 0,
                messages: []
            },
            {
                id: 4,
                name: 'سانجي',
                avatar: '🍜',
                rank: 'نائب جنرال',
                status: 'online',
                lastMessage: 'عندي طبخة جديدة',
                time: 'منذ 30 دقيقة',
                unread: 1,
                messages: []
            }
        ];
        
        let currentChatId = 1;
        let typingTimer;
        
        // تحميل قائمة المحادثات
        function loadChats() {
            const chatList = document.getElementById('chatList');
            chatList.innerHTML = '';
            
            chats.forEach(chat => {
                const statusClass = chat.status === 'online' ? 'online-status' : 'offline-status';
                const activeClass = chat.id === currentChatId ? 'active' : '';
                
                chatList.innerHTML += `
                    <div class="chat-item ${activeClass}" onclick="selectChat(${chat.id})">
                        <div class="chat-avatar">
                            ${chat.avatar}
                            <span class="online-status ${statusClass}"></span>
                        </div>
                        <div class="chat-info">
                            <div class="chat-name">${chat.name}</div>
                            <div class="chat-last-message">${chat.lastMessage}</div>
                        </div>
                        <div style="text-align: left;">
                            <div class="chat-time">${chat.time}</div>
                            ${chat.unread > 0 ? `<div class="unread-badge">${chat.unread}</div>` : ''}
                        </div>
                    </div>
                `;
            });
        }
        
        // اختيار محادثة
        function selectChat(chatId) {
            currentChatId = chatId;
            const chat = chats.find(c => c.id === chatId);
            
            document.getElementById('currentChatName').textContent = chat.name;
            document.getElementById('currentChatAvatar').textContent = chat.avatar;
            document.getElementById('currentChatStatus').textContent = chat.status === 'online' ? '🟢 متصل' : '⚫ غير متصل';
            
            // تحديث الكلاس النشط
            document.querySelectorAll('.chat-item').forEach(item => item.classList.remove('active'));
            event.currentTarget.classList.add('active');
            
            // تحميل الرسائل
            loadMessages(chatId);
        }
        
        // تحميل الرسائل
        function loadMessages(chatId) {
            const chat = chats.find(c => c.id === chatId);
            const messagesContainer = document.getElementById('chatMessages');
            messagesContainer.innerHTML = '';
            
            chat.messages.forEach(msg => {
                const messageClass = msg.sender === currentUser.username ? 'sent' : 'received';
                
                messagesContainer.innerHTML += `
                    <div class="message ${messageClass}">
                        <div class="message-avatar">${msg.sender === currentUser.username ? currentUser.avatar : chat.avatar}</div>
                        <div class="message-content">
                            <div class="message-text">${msg.content}</div>
                            <div class="message-time">${msg.time}</div>
                            ${msg.reactions ? `
                                <div class="message-reactions">
                                    ${msg.reactions.map(r => `<span class="reaction" onclick="addReaction(${msg.id}, '${r}')">${r}</span>`).join('')}
                                    <span class="reaction" onclick="addReaction(${msg.id}, '👍')">➕</span>
                                </div>
                            ` : ''}
                        </div>
                    </div>
                `;
            });
            
            // تمرير لآخر رسالة
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }
        
        // إرسال رسالة
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            
            if (!message || !currentChatId) return;
            
            const chat = chats.find(c => c.id === currentChatId);
            
            // إضافة الرسالة
            const newMessage = {
                id: Date.now(),
                sender: currentUser.username,
                content: message,
                time: new Date().toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' }),
                type: 'text'
            };
            
            chat.messages.push(newMessage);
            chat.lastMessage = message;
            chat.time = 'الآن';
            
            input.value = '';
            loadMessages(currentChatId);
            loadChats(); // تحديث القائمة
            
            // محاكاة رد تلقائي
            setTimeout(() => {
                if (Math.random() > 0.5) {
                    const reply = {
                        id: Date.now(),
                        sender: chat.name,
                        content: '👍',
                        time: new Date().toLocaleTimeString('ar-EG', { hour: '2-digit', minute: '2-digit' }),
                        type: 'text'
                    };
                    chat.messages.push(reply);
                    loadMessages(currentChatId);
                    loadChats();
                }
            }, 2000);
        }
        
        // إرسال ستيكر
        function sendSticker(sticker) {
            document.getElementById('messageInput').value = sticker;
            sendMessage();
            toggleStickers();
        }
        
        // إظهار/إخفاء الستيكرات
        function toggleStickers() {
            document.getElementById('stickersPanel').classList.toggle('show');
        }
        
        // مؤشر الكتابة
        function checkTyping() {
            document.getElementById('typingIndicator').style.display = 'block';
            
            clearTimeout(typingTimer);
            typingTimer = setTimeout(() => {
                document.getElementById('typingIndicator').style.display = 'none';
            }, 1000);
        }
        
        // إضافة رد فعل
        function addReaction(messageId, reaction) {
            // هتتضاف هنا
        }
        
        // بحث في المحادثات
        function searchChats() {
            const searchTerm = document.getElementById('chatSearch').value.toLowerCase();
            const chatList = document.getElementById('chatList');
            
            if (!searchTerm) {
                loadChats();
                return;
            }
            
            const filtered = chats.filter(c => c.name.toLowerCase().includes(searchTerm));
            chatList.innerHTML = '';
            
            filtered.forEach(chat => {
                chatList.innerHTML += `
                    <div class="chat-item" onclick="selectChat(${chat.id})">
                        <div class="chat-avatar">${chat.avatar}</div>
                        <div class="chat-info">
                            <div class="chat-name">${chat.name}</div>
                            <div class="chat-last-message">${chat.lastMessage}</div>
                        </div>
                    </div>
                `;
            });
        }
        
        // دوال إضافية
        function attachFile() {
            alert('📎 سيتم إضافة رفع الملفات قريباً');
        }
        
        function openEmoji() {
            alert('😊 سيتم إضافة لوحة الإيموجي قريباً');
        }
        
        function clearChat() {
            if (confirm('هل تريد مسح المحادثة؟')) {
                const chat = chats.find(c => c.id === currentChatId);
                chat.messages = [];
                loadMessages(currentChatId);
            }
        }
        
        function blockUser() {
            if (confirm('هل تريد حظر هذا المستخدم؟')) {
                alert('تم الحظر');
            }
        }
        
        // تحميل أولي
        loadChats();
        selectChat(1);
    </script>
</body>
</html>
