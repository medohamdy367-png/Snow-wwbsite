<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل دخول - SNOW KORAL ❄️</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">
                <span class="snow-icon">❄️</span>
                <h1>SNOW KORAL</h1>
            </div>
            <ul class="nav-links">
                <li><a href="index.html">الرئيسية</a></li>
                <li><a href="ranks.html">الرتب</a></li>
                <li><a href="members.html">الأعضاء</a></li>
                <li><a href="about.html">عن النقابة</a></li>
            </ul>
            <div class="auth-buttons">
                <a href="login.html" class="btn btn-login active">تسجيل دخول</a>
                <a href="signup.html" class="btn btn-signup">انضم الآن</a>
            </div>
        </nav>
    </header>

    <main>
        <div class="auth-container">
            <div class="auth-card">
                <h2>تسجيل دخول ❄️</h2>
                <form id="loginForm">
                    <div class="form-group">
                        <label for="username">اسم المستخدم</label>
                        <input type="text" id="username" name="username" required placeholder="أدخل اسمك في النقابة">
                    </div>
                    <div class="form-group">
                        <label for="password">كلمة المرور</label>
                        <input type="password" id="password" name="password" required placeholder="********">
                    </div>
                    <button type="submit" class="auth-btn">تسجيل دخول</button>
                </form>
                <div class="auth-footer">
                    <p>ليس لديك حساب؟ <a href="signup.html">انضم للنقابة الآن</a></p>
                    <p><a href="#">نسيت كلمة المرور؟</a></p>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div style="text-align: center; padding: 2rem; color: #6b8ca6;">
            © 2026 مملكة SNOW KORAL
        </div>
    </footer>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            // هنا هنضيف التحقق من البيانات لاحقاً
            window.location.href = 'dashboard/member-dashboard.html';
        });
    </script>
</body>
</html>
